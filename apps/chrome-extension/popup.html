<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI SDR Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      font-size: 13px;
    }
    .header {
      padding: 14px 16px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .header h1 { font-size: 14px; font-weight: 600; color: #f1f5f9; }
    .header p { font-size: 11px; color: #94a3b8; }
    .body { padding: 16px; }
    .section { margin-bottom: 14px; }
    label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
    input, select {
      width: 100%; padding: 8px 10px;
      background: #1e293b; border: 1px solid #334155;
      border-radius: 6px; color: #f1f5f9; font-size: 13px;
      outline: none;
    }
    input:focus, select:focus { border-color: #6366f1; }
    input::placeholder { color: #475569; }
    .btn {
      width: 100%; padding: 9px;
      background: #6366f1; border: none;
      border-radius: 6px; color: white; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .btn:hover { background: #4f46e5; }
    .btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    .btn-secondary {
      background: #1e293b; border: 1px solid #334155; color: #94a3b8;
      margin-bottom: 8px;
    }
    .btn-secondary:hover { border-color: #6366f1; color: #f1f5f9; background: #1e293b; }
    .status {
      padding: 8px 10px; border-radius: 6px;
      font-size: 12px; margin-bottom: 12px; display: none;
    }
    .status.success { background: #064e3b; color: #34d399; border: 1px solid #059669; display: block; }
    .status.error { background: #450a0a; color: #f87171; border: 1px solid #dc2626; display: block; }
    .status.info { background: #1e3a5f; color: #60a5fa; border: 1px solid #3b82f6; display: block; }
    .profile-box {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 6px; padding: 10px; margin-bottom: 14px;
    }
    .profile-box .name { font-weight: 600; color: #f1f5f9; }
    .profile-box .url { font-size: 11px; color: #6366f1; word-break: break-all; }
    .divider { border: none; border-top: 1px solid #334155; margin: 14px 0; }
    #login-section { }
    #main-section { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🤖</div>
    <div>
      <h1>AI SDR Agent</h1>
      <p>LinkedIn → Campaign in 1 click</p>
    </div>
  </div>

  <div class="body">
    <div id="status" class="status"></div>

    <!-- Login section -->
    <div id="login-section">
      <div class="section">
        <label>API URL</label>
        <input id="api-url" type="text" placeholder="https://api.yourdomain.com" />
      </div>
      <div class="section">
        <label>Email</label>
        <input id="login-email" type="email" placeholder="you@company.com" />
      </div>
      <div class="section">
        <label>Password</label>
        <input id="login-password" type="password" placeholder="••••••••" />
      </div>
      <button class="btn" id="login-btn">Sign in</button>
    </div>

    <!-- Main section (logged in) -->
    <div id="main-section">
      <div id="profile-info" class="profile-box" style="display:none">
        <div class="name" id="profile-name">LinkedIn Profile</div>
        <div class="url" id="profile-url"></div>
      </div>

      <div id="not-linkedin" style="display:none; color:#94a3b8; font-size:12px; margin-bottom:12px;">
        Navigate to a LinkedIn profile to add them.
      </div>

      <div class="section">
        <label>First name</label>
        <input id="first-name" type="text" placeholder="John" />
      </div>
      <div class="section">
        <label>Last name</label>
        <input id="last-name" type="text" placeholder="Smith" />
      </div>
      <div class="section">
        <label>Campaign</label>
        <select id="campaign-select">
          <option value="">Loading campaigns...</option>
        </select>
      </div>

      <button class="btn" id="add-btn">Add to Campaign</button>
      <hr class="divider" />
      <button class="btn btn-secondary" id="logout-btn">Sign out</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>

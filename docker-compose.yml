version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: aisdr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6390:6379"

volumes:
  postgres_data:
